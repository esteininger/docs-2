extends: substitution
message: "Use '%s' instead of '%s'."
level: error
ignorecase: false
action:
  name: replace
swap:
  pre-built: prebuilt
  Pre-built: Prebuilt
  builtin: built-in
  Builtin: Built-in
  # Match "url" in prose only: not at line start, not in backticks/quotes (identifiers/keys), not in param lists (", url")
  '(?<=[^\n])(?<![`", ])\burl\b(?![`"])': URL
  URLs: URLs
  deep agents SDK: Deep Agents SDK
  Deep agents SDK: Deep Agents SDK
  DeepAgents SDK: Deep Agents SDK
  DeepAgents SDK: Deep Agents SDK
